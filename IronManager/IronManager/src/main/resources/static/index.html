<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Manager</title>

    <style>
        body {
       font-family: 'Segoe UI', sans-serif;
       background: linear-gradient(135deg, #667eea, #764ba2);
       margin: 0;
       padding: 0;
       text-align: center;
   }

   /* Title */
   h1 {
       color: #fff;
       margin-top: 25px;
       letter-spacing: 1px;
   }

   /* Form Container */
   .container {
       width: 360px;
       margin: 30px auto;
       background: rgba(255, 255, 255, 0.15);
       backdrop-filter: blur(12px);
       padding: 25px;
       border-radius: 20px;
       box-shadow: 0 8px 30px rgba(0,0,0,0.3);
       animation: fadeIn 0.8s ease-in-out;
   }

   /* Inputs */
   input {
       width: 90%;
       padding: 12px;
       margin: 10px 0;
       border: none;
       border-radius: 10px;
       outline: none;
       background: rgba(255,255,255,0.9);
       transition: 0.3s;
   }

   input:focus {
       transform: scale(1.05);
       box-shadow: 0 0 10px #fff;
   }

   /* Buttons */
   button {
       padding: 10px 18px;
       margin: 8px 5px;
       border: none;
       border-radius: 10px;
       background: linear-gradient(to right, #00c6ff, #0072ff);
       color: white;
       font-weight: bold;
       cursor: pointer;
       transition: 0.3s;
   }

   button:hover {
       transform: translateY(-3px);
       box-shadow: 0 5px 15px rgba(0,0,0,0.3);
   }

   /* Section title */
   h2 {
       color: #fff;
       margin-top: 30px;
   }

   /* Employee list */
   #list {
       display: flex;
       flex-wrap: wrap;
       justify-content: center;
   }

   /* Employee Card */
   .emp {
       background: linear-gradient(135deg, #ffffff, #f1f1f1);
       margin: 15px;
       padding: 18px;
       border-radius: 15px;
       width: 260px;
       box-shadow: 0 8px 20px rgba(0,0,0,0.2);
       transition: 0.3s;
       animation: slideUp 0.5s ease;
   }

   /* Hover effect */
   .emp:hover {
       transform: translateY(-8px) scale(1.03);
   }

   /* Text */
   .emp b {
       font-size: 18px;
       color: #333;
   }

   /* Buttons inside card */
   .emp button {
       margin-top: 8px;
       width: 45%;
   }

   /* Update button */
   .emp button:nth-child(5) {
       background: linear-gradient(to right, #28a745, #218838);
   }

   /* Delete button */
   .emp button:nth-child(6) {
       background: linear-gradient(to right, #ff416c, #ff4b2b);
   }

   /* Animations */
   @keyframes fadeIn {
       from { opacity: 0; transform: scale(0.9); }
       to { opacity: 1; transform: scale(1); }
   }

   @keyframes slideUp {
       from { opacity: 0; transform: translateY(20px); }
       to { opacity: 1; transform: translateY(0); }
   }
    </style>
</head>
<body>

<h1>Employee Manager</h1>

<div class="container">

    <input type="text" id="name" placeholder="Name">
    <input type="text" id="email" placeholder="Email">
    <input type="text" id="phone" placeholder="Phone">

    <br>

    <button onclick="addEmployee()">Add</button>
    <button onclick="loadEmployees()">Load</button>

</div>

<h2>Employees List</h2>
<div id="list"> </div>

<script>

    const baseUrl = "http://localhost:8080/employees";

    // ADD
    async function addEmployee() {

        let emp = {
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            phone: document.getElementById("phone").value
        };

        await fetch(baseUrl, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(emp)
        });

        alert("Added");
        loadEmployees();
    }

    // GET
    async function loadEmployees() {

        let res = await fetch(baseUrl);
        let data = await res.json();

        let list = document.getElementById("list");
        list.innerHTML = "";

        data.forEach(emp => {
            list.innerHTML += `
                <div class="emp">
                    <b>${emp.name}</b><br>
                    ${emp.email}<br>
                    ${emp.phone}<br>

                    <button onclick="deleteEmp(${emp.id})">Delete</button>
                    <button onclick="updateEmp(${emp.id})">Update</button>
                </div>
            `;
        });
    }

    // DELETE
    async function deleteEmp(id) {
        await fetch(baseUrl + "/" + id, { method: "DELETE" });
        loadEmployees();
    }

    // UPDATE
    async function updateEmp(id) {

        let name = prompt("Enter new name");
        let email = prompt("Enter new email");
        let phone = prompt("Enter new phone");

        let emp = { name, email, phone };

        await fetch("http://localhost:8080/Employees/" + id, {
            method: "POST",   // your backend uses POST for update
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(emp)
        });

        loadEmployees();
    }

</script>

</body>
</html>
